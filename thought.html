<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thought — The Way</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%238b4513'/><text x='16' y='24' font-size='20' text-anchor='middle' fill='%23faf6f0'>✝</text></svg>" />

  <style>
    :root {
      --cream:     #faf6f0;
      --parchment: #f0e8d8;
      --brown:     #8b4513;
      --dark:      #2c1810;
      --gold:      #c9a050;
      --overlay:   rgba(20, 10, 5, 0.42);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; color: var(--dark); margin: 0; padding: 0; background: var(--parchment); }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .parallax { background-attachment: fixed; background-size: cover; background-position: center; position: relative; }
    @media (max-width: 768px) { .parallax { background-attachment: scroll; } }
    .parallax-overlay { position: absolute; inset: 0; background: var(--overlay); }
    .parallax-content { position: relative; z-index: 1; }

    #main-nav { position: absolute; top: 0; width: 100%; z-index: 100; background: rgba(44,24,16,0.5); border-bottom: 2px solid rgba(201,160,80,0.6); }
    .nav-link { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; color: #e8ddd0; text-decoration: none; padding: 0 4px 2px; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
    .nav-link:hover { color: var(--gold); border-bottom-color: var(--gold); }
    #nav-login-btn { font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); background: none; border: 1px solid rgba(201,160,80,0.5); border-radius: 2px; padding: 5px 14px; cursor: pointer; transition: background 0.2s; }
    #nav-login-btn:hover { background: rgba(201,160,80,0.15); }
    #admin-badge { display: none; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dark); background: var(--gold); border-radius: 2px; padding: 4px 10px; text-decoration: none; }
    #mobile-menu { display: none; background: var(--dark); border-top: 1px solid rgba(201,160,80,0.3); }
    #mobile-menu.open { display: block; }
    #mobile-menu a { display: block; padding: 12px 24px; color: #e8ddd0; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
    #mobile-menu a:hover { color: var(--gold); }

    .thought-body p { margin: 0 0 1.4em; font-size: 1.05rem; line-height: 1.85; color: #3a2010; }
    .thought-body p:last-child { margin-bottom: 0; }

    .footer-bar { background: var(--dark); color: #a09080; font-size: 0.8rem; padding: 18px 24px; text-align: center; }
    .footer-bar a { color: var(--gold); text-decoration: none; }
    .section-rule { width: 60px; height: 3px; background: var(--gold); margin: 0 auto 2rem; }

    .ftw-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(20,10,5,0.72); z-index: 1000; overflow-y: auto; padding: 40px 20px; }
    .ftw-modal-overlay.open { display: flex; align-items: center; justify-content: center; }
    .ftw-modal { background: var(--cream); border-radius: 4px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .ftw-modal-header { background: var(--dark); border-bottom: 3px solid var(--gold); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; border-radius: 4px 4px 0 0; }
    .ftw-modal-header h3 { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.1rem; margin: 0; }
    .ftw-modal-close { background: none; border: none; color: #a09080; font-size: 1.2rem; cursor: pointer; padding: 0; }
    .ftw-modal-close:hover { color: var(--gold); }
    .ftw-modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .ftw-modal-footer { padding: 16px 24px; display: flex; justify-content: flex-end; gap: 12px; border-top: 1px solid rgba(44,24,16,0.1); }
    .ftw-label { display: block; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--brown); margin-bottom: 5px; }
    .ftw-input { width: 100%; padding: 9px 12px; border: 1px solid #d0c0b0; border-radius: 3px; font-family: 'Lato', sans-serif; font-size: 0.95rem; color: var(--dark); background: white; outline: none; transition: border-color 0.15s; }
    .ftw-input:focus { border-color: var(--gold); }
    .btn-outline { display: inline-block; border: 2px solid var(--gold); color: var(--gold); font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 34px; border-radius: 2px; text-decoration: none; background: none; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .btn-outline:hover { background: var(--gold); color: var(--dark); }
    .btn-gold { display: inline-block; background: var(--gold); color: var(--dark); font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 34px; border-radius: 2px; border: none; cursor: pointer; transition: background 0.2s; }
    .btn-gold:hover { background: #d4af62; }
  </style>
</head>

<body>

<nav id="main-nav">
  <div style="max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;">
    <a href="index.html" style="font-family:'Playfair Display',serif;font-size:1.4rem;color:#faf6f0;text-decoration:none;font-weight:600;letter-spacing:0.02em;">The Way</a>
    <div id="desktop-links" style="display:flex;gap:24px;align-items:center;">
      <a href="index.html#home"    class="nav-link">Home</a>
      <a href="index.html#gospel"  class="nav-link">The Gospel</a>
      <a href="sermons.html"       class="nav-link">Sermons</a>
      <a href="events.html"        class="nav-link">Events</a>
      <a href="thoughts.html"      class="nav-link" style="color:var(--gold);border-bottom-color:var(--gold);">Thoughts</a>
      <a href="index.html#contact" class="nav-link">Contact</a>
      <a id="admin-badge" href="admin.html">Users</a>
      <button id="nav-login-btn" onclick="handleLoginClick()">Login</button>
    </div>
    <button id="hamburger" aria-label="Menu" style="display:none;background:none;border:none;color:#e8ddd0;font-size:1.4rem;cursor:pointer;padding:4px 8px;"><i class="fa-solid fa-bars"></i></button>
  </div>
  <div id="mobile-menu">
    <a href="index.html"         onclick="closeMobile()">Home</a>
    <a href="sermons.html"       onclick="closeMobile()">Sermons</a>
    <a href="events.html"        onclick="closeMobile()">Events</a>
    <a href="thoughts.html"      onclick="closeMobile()">Thoughts</a>
    <a href="index.html#contact" onclick="closeMobile()">Contact</a>
  </div>
</nav>

<!-- Hero image (parallax, replaced dynamically if thought has image) -->
<div id="thought-hero" class="parallax" style="background-image:url('assets/3-Sundayservice.jpeg');min-height:50vh;display:flex;align-items:center;justify-content:center;">
  <div class="parallax-overlay" style="background:rgba(20,10,5,0.55);"></div>
  <div class="parallax-content" style="text-align:center;padding:0 24px;max-width:860px;">
    <p id="hero-author-date" style="font-family:'Lato',sans-serif;font-size:0.82rem;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;font-weight:700;margin-bottom:0.8rem;"></p>
    <h1 id="hero-title" style="font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3.4rem);color:#faf6f0;font-weight:700;text-shadow:0 3px 20px rgba(0,0,0,0.6);margin:0;line-height:1.25;"></h1>
  </div>
</div>

<!-- Post body -->
<section style="padding:70px 24px 60px;max-width:780px;margin:0 auto;">
  <div id="post-loading" style="text-align:center;color:#8a6050;font-style:italic;padding:40px 0;">Loading…</div>
  <div id="post-error"   style="display:none;text-align:center;color:#8a6050;font-style:italic;padding:40px 0;">Content temporarily unavailable.</div>

  <article id="post-body" style="display:none;">
    <div id="thought-body-content" class="thought-body"></div>

    <hr style="border:none;border-top:2px solid var(--gold);opacity:0.4;margin:3rem 0 2rem;" />

    <div style="text-align:center;">
      <a href="thoughts.html" style="font-family:'Lato',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--brown);text-decoration:none;border-bottom:2px solid var(--gold);padding-bottom:2px;">
        <i class="fa-solid fa-arrow-left"></i> &nbsp;Back to All Thoughts
      </a>
    </div>
  </article>
</section>

<div class="parallax" style="background-image:url('assets/6-guatemala.jpeg');background-position:top;min-height:25vh;display:flex;align-items:center;justify-content:center;">
  <div class="parallax-overlay"></div>
  <div class="parallax-content" style="text-align:center;padding:0 24px;">
    <p style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#faf6f0;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,0.5);">The Way — Savoy, TX</p>
    <p style="font-family:'Lato',sans-serif;font-size:0.8rem;color:#d4b990;letter-spacing:0.1em;text-transform:uppercase;">Making and growing followers of Jesus</p>
  </div>
</div>

<div class="footer-bar">&copy; <span id="year"></span> The Way &nbsp;·&nbsp; 308 E Fowler Street, Savoy, TX 75479</div>


<!-- Login Modal -->
<div id="login-modal" class="ftw-modal-overlay" onclick="overlayClose(event,'login-modal')">
  <div class="ftw-modal">
    <div class="ftw-modal-header"><h3>Sign In</h3><button class="ftw-modal-close" onclick="closeModal('login-modal')">&times;</button></div>
    <div class="ftw-modal-body">
      <div><label class="ftw-label">Email</label><input id="login-email" class="ftw-input" type="email" /></div>
      <div><label class="ftw-label">Password</label><input id="login-password" class="ftw-input" type="password" /></div>
      <p id="login-error" style="color:#8b2222;font-size:0.85rem;display:none;"></p>
    </div>
    <div class="ftw-modal-footer">
      <button class="btn-outline" style="padding:10px 20px;font-size:0.8rem;" onclick="closeModal('login-modal')">Cancel</button>
      <button class="btn-gold"   style="padding:10px 24px;font-size:0.8rem;" onclick="submitLogin()">Sign In</button>
    </div>
  </div>
</div>


<script>
  const API = '/api';
  window.FTW = { user: null };
  document.getElementById('year').textContent = new Date().getFullYear();

  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');
  const desktopLinks = document.getElementById('desktop-links');
  function applyNavLayout() {
    if (window.innerWidth < 768) { hamburger.style.display = 'block'; desktopLinks.style.display = 'none'; }
    else { hamburger.style.display = 'none'; desktopLinks.style.display = 'flex'; mobileMenu.classList.remove('open'); }
  }
  hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
  window.addEventListener('resize', applyNavLayout);
  applyNavLayout();
  function closeMobile() { mobileMenu.classList.remove('open'); }

  async function apiFetch(path, options = {}) {
    const token = localStorage.getItem('ftw_token');
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, { ...options, headers });
    if (res.status === 401) { localStorage.removeItem('ftw_token'); window.FTW.user = null; }
    return res;
  }

  async function initAuth() {
    const token = localStorage.getItem('ftw_token');
    if (!token) { applyAuthUI(null); return; }
    try { const res = await apiFetch('/auth/me'); window.FTW.user = res.ok ? await res.json() : null; }
    catch (e) { window.FTW.user = null; }
    applyAuthUI(window.FTW.user);
  }

  function applyAuthUI(user) {
    document.getElementById('nav-login-btn').textContent = user ? 'Logout' : 'Login';
    document.getElementById('admin-badge').style.display = user?.role === 'admin' ? 'inline-block' : 'none';
  }

  function handleLoginClick() { if (window.FTW.user) { logout(); } else { openModal('login-modal'); } }
  function logout() { localStorage.removeItem('ftw_token'); window.FTW.user = null; applyAuthUI(null); }

  async function submitLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    try {
      const res  = await fetch(API + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Login failed'; errEl.style.display = 'block'; return; }
      localStorage.setItem('ftw_token', data.token);
      window.FTW.user = { id: data.id, name: data.name, role: data.role, email };
      applyAuthUI(window.FTW.user);
      closeModal('login-modal');
    } catch (e) { errEl.textContent = 'Network error.'; errEl.style.display = 'block'; }
  }

  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  function overlayClose(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.ftw-modal-overlay.open').forEach(el => el.classList.remove('open')); });

  function fmtDate(str) {
    if (!str) return '';
    const [y, m, d] = str.split('-');
    return new Date(+y, +m - 1, +d).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function bodyToHtml(text) {
    return text.split(/\n\n+/)
      .map(p => `<p>${escHtml(p).replace(/\n/g,'<br>')}</p>`)
      .join('');
  }

  async function loadThought() {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'), 10);
    if (!id) { showError(); return; }

    try {
      const res = await fetch(`${API}/thoughts/${id}`);
      if (!res.ok) { showError(); return; }
      const t = await res.json();

      // Update page title
      document.title = `${t.title} — The Way`;

      // Hero: swap background if thought has an image
      if (t.image_url) {
        document.getElementById('thought-hero').style.backgroundImage = `url('${t.image_url}')`;
      }

      // Populate hero text
      document.getElementById('hero-author-date').textContent = `${t.author}  ·  ${fmtDate(t.publish_date)}`;
      document.getElementById('hero-title').textContent = t.title;

      // Render body
      document.getElementById('thought-body-content').innerHTML = bodyToHtml(t.body);

      document.getElementById('post-loading').style.display = 'none';
      document.getElementById('post-body').style.display = 'block';
    } catch (e) {
      showError();
    }
  }

  function showError() {
    document.getElementById('post-loading').style.display = 'none';
    document.getElementById('post-error').style.display = 'block';
  }

  initAuth();
  loadThought();
</script>

</body>
</html>
